# Oracle DB オブジェクトコピーツール 設定ファイル(サンプル)
# このファイルをコピーして config.yaml として使用してください

# ソースデータベース（コピー元）
source:
  host: "localhost"
  port: 1521
  service: "ORCL"  # サービス名またはSID
  username: "source_user"
  password: "source_password"

# ターゲットデータベース（コピー先）
target:
  host: "localhost"
  port: 1521
  service: "TESTDB"
  username: "target_user"
  password: "target_password"

# コピーオプション
options:
  # コピー前にターゲットのオブジェクトを削除するか
  drop_before_create: true
  
  # エラーが発生しても続行するか
  skip_errors: true
  
  # コピーするオブジェクトの種類
  object_types:
    - TABLE
    - VIEW
    - PROCEDURE
    - FUNCTION
    - PACKAGE
    - TRIGGER
    - SEQUENCE
