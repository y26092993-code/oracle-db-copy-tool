# Oracle SQL一括実行アプリケーション 設定ファイルサンプル
# oracle.py --config config.yaml で使用します
# ※ パスワードなどの機密情報は実際の値に変更してください

database:
  # ホスト名またはIPアドレス
  host: localhost

  # ポート番号（デフォルト: 1521）
  port: 1521

  # サービス名（service_name か sid のいずれかを指定）
  service_name: ORCL
  # sid: ORCL  # service_name の代わりに SID を使用する場合はこちらをアンコメント

  # 接続ユーザー名
  user: your_username

  # パスワード（ダミー値 - 実際の値に変更してください）
  password: your_password
